# cfn/expense-app-dev.yaml
# TASK 3 application stack: an RDS PostgreSQL instance + DB subnet group + DB
# security group. Consumes the network stack's exports via !ImportValue (never
# hardcodes subnet/VPC/SG IDs -- cross-stack references are how we avoid stale-ID
# drift after a network rebuild).
#
# DB master credentials: the password is NEVER a Parameter (NoEcho or not -- a
# NoEcho Parameter still lands in the template's parameter history and in
# `describe-stacks` tooling paths). CFN generates + owns the secret in-stack via
# AWS::SecretsManager::Secret + GenerateSecretString, the RDS instance resolves it
# with the {{resolve:secretsmanager:...}} dynamic reference (CFN substitutes the
# plaintext straight into the RDS API call -- it never lands in template state),
# and a SecretTargetAttachment binds the secret to the live DB so rotation can
# target it. (Review note W6D3: the scaffold's in-stack-secret shape is the
# preferred one -- an earlier revision used a hand-created out-of-band secret;
# switched to this on ES feedback.)
#
# Stateful resources (the secret AND the DB) carry BOTH DeletionPolicy: Retain AND
# UpdateReplacePolicy: Retain so neither a stack delete nor a property-change
# replacement destroys data.
AWSTemplateFormatVersion: "2010-09-09"
Description: expense application stack -- RDS (cross-stack imports + SM dynamic ref) (aaron).

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment.
  NetworkStackName:
    Type: String
    Default: expense-network-dev-aaron
    Description: Name of the network stack whose exports this stack !ImportValue's.
  SecretName:
    Type: String
    Default: expense/dev/db-master-aaron
    Description: Name for the CFN-managed DB master secret (username/password).
  DbInstanceClass:
    Type: String
    Default: db.t4g.small
    AllowedValues: [db.t4g.small, db.t4g.medium, db.m6g.large]
    Description: RDS instance class (dev keeps the smallest burstable class).

Resources:
  # --- CFN-managed DB master secret. GenerateSecretString builds the password at
  # create time (CFN never sees a plaintext input); Retain on BOTH policies so a
  # stack delete / replacement can't destroy the live credentials.
  DbMasterSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W77
            reason: >-
              Encrypted with the default aws/secretsmanager KMS key — a dedicated CMK
              is out of scope for this dev secret; staging/prod would set KmsKeyId.
    Properties:
      Name:        !Ref SecretName
      Description: !Sub "expense ${EnvName} RDS master credentials (aaron)."
      GenerateSecretString:
        # username is fixed in the template; only the password is generated.
        SecretStringTemplate: '{"username": "expense_master"}'
        GenerateStringKey:    password
        PasswordLength:       32
        ExcludeCharacters:    '"@/\'
      Tags:
        - {Key: Env,     Value: !Ref EnvName}
        - {Key: Project, Value: expense}

  # --- DB subnet group spanning the private subnets imported from the network
  # stack. !Split + !ImportValue is the cross-stack pattern; the import resolves
  # to concrete subnet IDs at deploy time (visible in describe-change-set).
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "expense ${EnvName} private subnets (aaron)"
      SubnetIds:
        !Split
          - ","
          - !ImportValue
            "Fn::Sub": "${NetworkStackName}-PrivateSubnets"
      Tags:
        - {Key: Env,     Value: !Ref EnvName}
        - {Key: Project, Value: expense}

  # --- DB security group: ingress 5432 ONLY from the app SG (imported). No cidr
  # ingress. Explicit egress kept minimal.
  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W40
            reason: >-
              Egress is intentionally restricted to a single self-referential 443
              rule; RDS needs no broad outbound. The rule is the allow-list.
          - id: W5
            reason: >-
              The single egress rule targets the VPC CIDR imported from the network
              stack, not 0.0.0.0/0.
    Properties:
      GroupDescription: !Sub "expense ${EnvName} DB SG (5432 from app SG only) (aaron)."
      VpcId:
        !ImportValue
          "Fn::Sub": "${NetworkStackName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol:            tcp
          FromPort:              5432
          ToPort:                5432
          SourceSecurityGroupId:
            !ImportValue
              "Fn::Sub": "${NetworkStackName}-AppSgId"
          Description: Postgres from app SG only.
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort:   443
          ToPort:     443
          CidrIp:
            !ImportValue
              "Fn::Sub": "${NetworkStackName}-VpcCidr"
          Description: In-VPC HTTPS only (no broad egress needed for a DB).
      Tags:
        - {Key: Name, Value: !Sub "expense-${EnvName}-aaron-db-sg"}

  # --- The RDS instance. Stateful: Retain on BOTH policies. MasterUsername +
  # MasterUserPassword come from the out-of-band secret via dynamic reference;
  # the password never appears in CFN template state.
  DbInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    # Dynamic references do NOT create a dependency, so pin creation order
    # explicitly: the secret must exist before the RDS resolves the password.
    DependsOn: DbMasterSecret
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: F80
            reason: >-
              DeletionPolicy: Retain IS set (F80 mis-fires on the dynamic-reference
              form); a stack delete retains the instance by design.
          - id: W28
            reason: >-
              Explicit DBInstanceIdentifier gives a stable, predictable endpoint
              hostname for the app config; -aaron already prevents a shared-account
              collision. Replacement is guarded by DeletionPolicy/UpdateReplacePolicy.
    Properties:
      DBInstanceIdentifier:  !Sub "expense-${EnvName}-aaron"
      Engine:                postgres
      EngineVersion:         "16.9"
      DBInstanceClass:       !Ref DbInstanceClass
      AllocatedStorage:      "20"
      StorageType:           gp3
      StorageEncrypted:      true
      DBSubnetGroupName:     !Ref DbSubnetGroup
      VPCSecurityGroups:     [!Ref DbSecurityGroup]
      PubliclyAccessible:    false
      MultiAZ:               false
      BackupRetentionPeriod: 7
      DeletionProtection:    false
      MasterUsername:
        "Fn::Sub": "{{resolve:secretsmanager:${SecretName}:SecretString:username}}"
      MasterUserPassword:
        "Fn::Sub": "{{resolve:secretsmanager:${SecretName}:SecretString:password}}"
      Tags:
        - {Key: Env,     Value: !Ref EnvName}
        - {Key: Project, Value: expense}

  # --- Bind the secret to the live DB so Secrets Manager rotation can target the
  # instance ARN and the secret records its host/port/dbname connection details.
  DbSecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId:   !Ref DbMasterSecret
      TargetId:   !Ref DbInstance
      TargetType: AWS::RDS::DBInstance

Outputs:
  DbEndpoint:
    Value: !GetAtt DbInstance.Endpoint.Address
    Export: {Name: !Sub "${AWS::StackName}-DbEndpoint"}
  DbSecretArn:
    Value: !Ref DbMasterSecret
    Export: {Name: !Sub "${AWS::StackName}-DbSecretArn"}
  DbSecurityGroupId:
    Value: !Ref DbSecurityGroup
    Export: {Name: !Sub "${AWS::StackName}-DbSgId"}
