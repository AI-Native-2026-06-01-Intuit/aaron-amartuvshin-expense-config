# cfn/expense-network-dev.yaml
# TASK 2 network stack: 3-AZ VPC, IGW, public + private subnets (one of each per
# AZ), per-env NAT GW count gated by Conditions (single NAT in dev for cost; NAT
# per-AZ in staging/prod for HA), and one application security group. Outputs are
# EXPORTED for the application stack (Task 3) to consume via !ImportValue.
#
# Deploy: expense-network-dev-aaron (the -aaron suffix disambiguates the shared
# team67 account; the export names inherit ${AWS::StackName} so they carry the
# suffix too and the app stack imports them by the suffixed stack name).
AWSTemplateFormatVersion: "2010-09-09"
Description: expense 3-AZ VPC + app SG -- parameterised by env (aaron).

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment; gates NAT-GW count (dev=1, staging/prod=3).
  VpcCidr:
    Type: String
    Default: 10.42.0.0/16
    Description: VPC CIDR. Must not overlap any peered network.
    AllowedPattern: "^10\\.\\d{1,3}\\.0\\.0/16$"

Conditions:
  # IsDev: only dev gets a single NAT GW (cost). IsHA (staging/prod) gets one per
  # AZ so a single-AZ NAT outage can't sever egress for the other two AZs.
  IsDev: !Equals [!Ref EnvName, dev]
  IsHA:  !Not    [!Equals [!Ref EnvName, dev]]

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W60
            reason: >-
              VPC flow logs are intentionally omitted for this dev training VPC;
              they add CloudWatch Logs / S3 delivery cost and are out of scope here.
              staging/prod would attach a flow log (documented in INFRA.md).
    Properties:
      CidrBlock:           !Ref VpcCidr
      EnableDnsSupport:    true
      EnableDnsHostnames:  true
      Tags:
        - {Key: Name,    Value: !Sub "expense-${EnvName}-aaron-vpc"}
        - {Key: Env,     Value: !Ref EnvName}
        - {Key: Project, Value: expense}
        # Added via a Task-4 UPDATE ChangeSet to demonstrate an in-place Modify
        # (Replacement: False) — a tag change never replaces the VPC.
        - {Key: Tier,    Value: network}

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - {Key: Name, Value: !Sub "expense-${EnvName}-aaron-igw"}

  IgwAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId:             !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # --- Public subnets (3): IGW-routed, host the NAT GW(s). /24 each carved from
  # the /16 via !Cidr (6 subnets total = 3 public + 3 private), so the template
  # is portable across capstone CIDRs.
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W33
            reason: >-
              MapPublicIpOnLaunch: true is intentional — these are PUBLIC subnets;
              the NAT GW + any bastion need an auto-assigned public IP. Private
              subnets (workloads) deliberately leave it default-false.
    Properties:
      VpcId:               !Ref Vpc
      AvailabilityZone:    !Select [0, !GetAZs ""]
      CidrBlock:           !Select [0, !Cidr [!Ref VpcCidr, 6, 8]]
      MapPublicIpOnLaunch: true
      Tags:
        - {Key: Name, Value: !Sub "expense-${EnvName}-aaron-public-a"}
  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W33
            reason: Public subnet — MapPublicIpOnLaunch is intentional (see PublicSubnetA).
    Properties:
      VpcId:               !Ref Vpc
      AvailabilityZone:    !Select [1, !GetAZs ""]
      CidrBlock:           !Select [1, !Cidr [!Ref VpcCidr, 6, 8]]
      MapPublicIpOnLaunch: true
      Tags:
        - {Key: Name, Value: !Sub "expense-${EnvName}-aaron-public-b"}
  PublicSubnetC:
    Type: AWS::EC2::Subnet
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W33
            reason: Public subnet — MapPublicIpOnLaunch is intentional (see PublicSubnetA).
    Properties:
      VpcId:               !Ref Vpc
      AvailabilityZone:    !Select [2, !GetAZs ""]
      CidrBlock:           !Select [2, !Cidr [!Ref VpcCidr, 6, 8]]
      MapPublicIpOnLaunch: true
      Tags:
        - {Key: Name, Value: !Sub "expense-${EnvName}-aaron-public-c"}

  # --- Private subnets (3): NAT-routed, host workloads.
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:            !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock:        !Select [3, !Cidr [!Ref VpcCidr, 6, 8]]
      Tags:
        - {Key: Name, Value: !Sub "expense-${EnvName}-aaron-private-a"}
  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:            !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock:        !Select [4, !Cidr [!Ref VpcCidr, 6, 8]]
      Tags:
        - {Key: Name, Value: !Sub "expense-${EnvName}-aaron-private-b"}
  PrivateSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:            !Ref Vpc
      AvailabilityZone: !Select [2, !GetAZs ""]
      CidrBlock:        !Select [5, !Cidr [!Ref VpcCidr, 6, 8]]
      Tags:
        - {Key: Name, Value: !Sub "expense-${EnvName}-aaron-private-c"}

  # --- NAT Gateway: always at least one (A); B and C only in HA envs.
  NatEipA:
    Type: AWS::EC2::EIP
    DependsOn: IgwAttachment
    Properties:
      Domain: vpc
      Tags: [{Key: Name, Value: !Sub "expense-${EnvName}-aaron-nat-eip-a"}]
  NatGatewayA:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEipA.AllocationId
      SubnetId:     !Ref PublicSubnetA
      Tags: [{Key: Name, Value: !Sub "expense-${EnvName}-aaron-nat-a"}]

  NatEipB:
    Type: AWS::EC2::EIP
    Condition: IsHA
    DependsOn: IgwAttachment
    Properties: {Domain: vpc}
  NatGatewayB:
    Type: AWS::EC2::NatGateway
    Condition: IsHA
    Properties:
      AllocationId: !GetAtt NatEipB.AllocationId
      SubnetId:     !Ref PublicSubnetB

  NatEipC:
    Type: AWS::EC2::EIP
    Condition: IsHA
    DependsOn: IgwAttachment
    Properties: {Domain: vpc}
  NatGatewayC:
    Type: AWS::EC2::NatGateway
    Condition: IsHA
    Properties:
      AllocationId: !GetAtt NatEipC.AllocationId
      SubnetId:     !Ref PublicSubnetC

  # --- Public route table: 0.0.0.0/0 -> IGW. Shared across all 3 AZs.
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref Vpc}
  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttachment
    Properties:
      RouteTableId:         !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId:            !Ref InternetGateway
  PublicAssocA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PublicSubnetA, RouteTableId: !Ref PublicRouteTable}
  PublicAssocB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PublicSubnetB, RouteTableId: !Ref PublicRouteTable}
  PublicAssocC:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PublicSubnetC, RouteTableId: !Ref PublicRouteTable}

  # --- Private route tables: one per AZ in HA (each routes via its own NAT GW);
  # a single shared table in dev (all 3 AZs route via NAT A).
  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref Vpc}
  PrivateDefaultRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId:         !Ref PrivateRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId:         !Ref NatGatewayA
  PrivateAssocA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PrivateSubnetA, RouteTableId: !Ref PrivateRouteTableA}

  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Condition: IsHA
    Properties: {VpcId: !Ref Vpc}
  PrivateDefaultRouteB:
    Type: AWS::EC2::Route
    Condition: IsHA
    Properties:
      RouteTableId:         !Ref PrivateRouteTableB
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId:         !Ref NatGatewayB
  PrivateAssocBHA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsHA
    Properties: {SubnetId: !Ref PrivateSubnetB, RouteTableId: !Ref PrivateRouteTableB}
  # In dev: route B through the single NAT (A).
  PrivateAssocBDev:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsDev
    Properties: {SubnetId: !Ref PrivateSubnetB, RouteTableId: !Ref PrivateRouteTableA}

  PrivateRouteTableC:
    Type: AWS::EC2::RouteTable
    Condition: IsHA
    Properties: {VpcId: !Ref Vpc}
  PrivateDefaultRouteC:
    Type: AWS::EC2::Route
    Condition: IsHA
    Properties:
      RouteTableId:         !Ref PrivateRouteTableC
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId:         !Ref NatGatewayC
  PrivateAssocCHA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsHA
    Properties: {SubnetId: !Ref PrivateSubnetC, RouteTableId: !Ref PrivateRouteTableC}
  PrivateAssocCDev:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsDev
    Properties: {SubnetId: !Ref PrivateSubnetC, RouteTableId: !Ref PrivateRouteTableA}

  # --- Application security group: only the app port from inside the VPC; no
  # 0.0.0.0/0 ingress. Egress 443 to the internet (via NAT) for ECR/STS/Secrets
  # Manager pulls; egress 5432 to the DB SG is added by the app stack (Task 3).
  ExpenseAppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W5
            reason: >-
              Egress 443 to 0.0.0.0/0 is required so private-subnet workloads can
              reach ECR / STS / Secrets Manager public endpoints via the NAT GW;
              locking egress to VPC-only would break image pulls and OIDC.
          - id: W40
            reason: >-
              IpProtocol is intentionally constrained to tcp/443 egress only (not an
              all-protocols egress rule); the single explicit rule is the allow-list.
          - id: W28
            reason: >-
              Explicit GroupName gives the app + DB stacks a stable, human-readable
              SG to reference; -aaron already prevents a shared-account collision.
    Properties:
      GroupName:        !Sub "expense-${EnvName}-aaron-app-sg"
      GroupDescription: App SG; ingress 8080 from VPC only; egress 443 to internet only.
      VpcId:            !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort:   8080
          ToPort:     8080
          CidrIp:     !Ref VpcCidr
          Description: App port, in-VPC only.
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort:   443
          ToPort:     443
          CidrIp:     0.0.0.0/0
          Description: HTTPS egress (ECR, STS, Secrets Manager).
      Tags:
        - {Key: Name, Value: !Sub "expense-${EnvName}-aaron-app-sg"}

Outputs:
  VpcId:
    Value: !Ref Vpc
    Export: {Name: !Sub "${AWS::StackName}-VpcId"}
  VpcCidr:
    Value: !Ref VpcCidr
    Export: {Name: !Sub "${AWS::StackName}-VpcCidr"}
  PrivateSubnets:
    # Comma-joined; consumers split with !Split.
    Value: !Join [",", [!Ref PrivateSubnetA, !Ref PrivateSubnetB, !Ref PrivateSubnetC]]
    Export: {Name: !Sub "${AWS::StackName}-PrivateSubnets"}
  PublicSubnets:
    Value: !Join [",", [!Ref PublicSubnetA, !Ref PublicSubnetB, !Ref PublicSubnetC]]
    Export: {Name: !Sub "${AWS::StackName}-PublicSubnets"}
  AppSecurityGroupId:
    Value: !Ref ExpenseAppSecurityGroup
    Export: {Name: !Sub "${AWS::StackName}-AppSgId"}
