# cfn/expense-artifacts-dev.yaml
# TASK 3 S3 artefact bucket -- holds the W5 D4 SAM build artefacts and Argo CD
# config snapshots. Hardened defaults from day one. BOTH DeletionPolicy: Retain
# AND UpdateReplacePolicy: Retain so neither a stack delete nor a property-change
# replacement ever destroys live data. Independent of the network stack; deploy it
# before the app stack so the bucket exists before anything writes to it.
AWSTemplateFormatVersion: "2010-09-09"
Description: expense artefact bucket -- KMS, PAB, lifecycle, deny-non-TLS (aaron).

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment.

Resources:
  ExpenseArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: >-
              Access logging intentionally omitted for this dev artefact bucket; a
              dedicated log-delivery bucket is out of scope for the training env.
    Properties:
      # -aaron disambiguates within the shared team67 account (the bare
      # uptimecrew-expense-artifacts-dev-<acct> name is already taken).
      BucketName: !Sub "uptimecrew-expense-artifacts-${EnvName}-aaron-${AWS::AccountId}"
      VersioningConfiguration: {Status: Enabled}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls:       true
        BlockPublicPolicy:     true
        IgnorePublicAcls:      true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: tier-then-archive
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 90
              - StorageClass: GLACIER_IR
                TransitionInDays: 365
          - Id: expire-old-versions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      Tags:
        - {Key: Env,     Value: !Ref EnvName}
        - {Key: Project, Value: expense}

  ArtefactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ExpenseArtifactsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyNonTLS
            Effect: Deny
            Principal: "*"
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !GetAtt ExpenseArtifactsBucket.Arn
              - !Sub "${ExpenseArtifactsBucket.Arn}/*"
            Condition:
              Bool: {"aws:SecureTransport": "false"}
          - Sid: DenyUnencryptedPut
            Effect: Deny
            Principal: "*"
            Action: s3:PutObject
            Resource: !Sub "${ExpenseArtifactsBucket.Arn}/*"
            Condition:
              StringNotEquals:
                "s3:x-amz-server-side-encryption": aws:kms

Outputs:
  ArtefactBucketName:
    Value: !Ref ExpenseArtifactsBucket
    Export: {Name: !Sub "${AWS::StackName}-BucketName"}
  ArtefactBucketArn:
    Value: !GetAtt ExpenseArtifactsBucket.Arn
    Export: {Name: !Sub "${AWS::StackName}-BucketArn"}
