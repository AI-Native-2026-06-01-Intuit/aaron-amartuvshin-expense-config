# k8s/expense-api/kustomization.yaml
# Makes this directory a self-contained kustomize root so overlays/dev can
# reference it as `../../k8s/expense-api` (a directory base) without
# tripping kustomize's default LoadRestrictionsRootOnly, which forbids a
# kustomization.yaml from referencing individual *files* outside its own
# directory tree (per-file `- ../../k8s/expense-api/hpa.yaml` entries in
# overlays/dev/kustomization.yaml fail that check; a directory reference to
# another self-contained kustomization root does not).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - hpa.yaml
  - pdb.yaml
  - expense-worker-scaledobject.yaml
  - worker-deployment.yaml
